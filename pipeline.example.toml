database_url = "sqlite:///data/papers.db"
papers_dir = "data/papers"
academic_email = "researcher@example.org"

[crawler]
sources = ["arxiv", "pubmed", "crossref", "europe_pmc", "semantic_scholar", "openalex"]
total = 100
concurrency = 5
delay_seconds = 0.5
semantic_scholar_api_key = ""
openalex_api_key = ""

[downloader]
concurrency = 10
delay_seconds = 0.2
retries = 3
max_size_mb = 100
semantic_scholar_api_key = ""
springer_nature_api_key = ""
elsevier_api_key = ""
use_publisher_apis = true
use_unpaywall = true
use_semantic_scholar = true
use_crossref = true
inspect_landing_pages = true
resume = true

[extraction]
profile = "catalysis"
schema = "schemas/catalysis.json"
concurrency = 4
retries = 4
timeout_seconds = 600
max_output_tokens = 12000

[extraction.provider]
name = "custom-provider"
base_url = "https://example.com/v1"
api_key = ""
model = "replace-with-model-id"
api_style = "chat_completions"
pdf_mode = "text"
structured_output = "auto"
output_token_param = "max_tokens"
allow_empty_api_key = false
keep_remote_file = false
text_chunk_chars = 80000
max_text_chunks = 0

[extraction.provider.extra_headers]

[extraction.provider.request_options]
temperature = 0

